name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: the test job only checks out and runs pytest, so it
# needs read access and nothing else. Satisfies the Scorecard Token-Permissions
# check and limits blast radius if a dependency in CI were ever compromised.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a fast follow-up push doesn't
# queue behind a stale one.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          # Unit tests mock every optional connector SDK, so they run on the
          # core deps + dev tools. We intentionally do NOT install the heavy
          # [all] extra here (snowflake-connector-python et al.): its fresh
          # dependency resolution is slow and fragile on CI runners and is not
          # needed to exercise the test suite.
          pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q
