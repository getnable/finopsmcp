  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:500;letter-spacing:-.02em;font-size:16px}
  .logo img{width:24px;height:24px;border-radius:6px;display:block}
  .logo .tag{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-weight:500;font-size:11px;color:var(--fg-3);border:1px solid var(--line-2);border-radius:2px;padding:1px 6px;margin-left:4px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:500;border:1px solid var(--line);background:transparent;color:var(--fg-2);cursor:pointer;transition:.15s;font-family:inherit}
  .btn:hover{color:var(--fg);border-color:var(--line-2);background:var(--bg-2)}
  main{min-height:calc(100vh - 60px);padding:48px 0 96px}
  h1{font-size:24px;font-weight:500;letter-spacing:-.025em;margin-bottom:4px}
  .sub{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-size:12px;color:var(--fg-3);margin-bottom:28px}

  .stat-strip{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:24px;flex-wrap:wrap}
  .stat{flex:1;min-width:140px;padding:16px 18px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:0}
  .stat .v{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--fg);font-variant-numeric:tabular-nums}
  .stat .k{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-weight:500;font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;font-weight:500;padding:10px 12px;border-bottom:1px solid var(--line-2)}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--line);color:var(--fg-2)}
  tbody tr:hover{background:var(--bg-2)}
  td.email{color:var(--fg);font-weight:500}
  td.num{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right}
  .pill{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-weight:500;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;border-radius:2px;padding:2px 7px;border:1px solid var(--line-2);color:var(--fg-3)}
  .pill.team,.pill.pro{color:var(--accent);border-color:var(--accent-dim)}
  .pill.trial{color:var(--warn);border-color:var(--warn)}
  .pill.req{color:var(--success);border-color:var(--success)}
  .pill.self{color:var(--fg-2)}

  .msg{max-width:480px;margin:40px auto;text-align:center}
  .msg h1{margin-bottom:10px}
  .msg p{color:var(--fg-2);font-size:14px;margin-bottom:18px}
  .msg .btn{background:var(--fg);color:var(--bg);border-color:var(--fg)}
  .msg .btn:hover{background:#fff}
  #loading,#denied,#admin{display:none}
  #loading.on,#denied.on,#admin.on{display:block}
  @media(max-width:720px){.wrap{padding:0 18px}.hide-sm{display:none}}

<script>
(function() {
  // Capture UTM params and pass to PostHog
  const params = new URLSearchParams(window.location.search);
  const utm = {};
  ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(k => {
    const v = params.get(k);
    if (v) utm[k] = v;
  });
  // Also capture reddit click id
  const rdt = params.get('rdt_cid');
  if (rdt) utm['rdt_cid'] = rdt;

  if (Object.keys(utm).length > 0) {
    // Store in session
    sessionStorage.setItem('nable_utm', JSON.stringify(utm));
    // Register as PostHog super properties
    if (window.posthog) posthog.register(utm);
  } else {
    // Restore from session (for subsequent page views in same session)
    const stored = sessionStorage.getItem('nable_utm');
    if (stored && window.posthog) {
      try { posthog.register(JSON.parse(stored)); } catch {}
    }
  }
})();
</script>

<body>
<nav class="nav">
  <div class="wrap nav-inner">
    <a href="/" class="logo"><img src="/favicon.svg" alt="" /><span>nable</span><span class="tag">admin</span></a>
    <a href="/account" class="btn">Account</a>
  </div>
</nav>

<main>
  <div class="wrap">

    <div id="loading" class="msg"><p class="sub" style="margin:0">Loading…</p></div>

    <div id="denied" class="msg">
      <h1>Not authorized</h1>
      <p id="denied-msg" role="alert">This page is for nable admins. Sign in with an admin account.</p>
      <a href="/account" class="btn">Go to sign in</a>
    </div>

    <div id="admin">
      <h1>Customers</h1>
      <p class="sub" id="admin-sub"></p>
      <div class="stat-strip" id="stat-strip"></div>
      <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th scope="col">Email</th><th scope="col">Plan</th><th scope="col">Status</th>
            <th class="num" scope="col">MRR</th><th scope="col">Hosting</th><th class="hide-sm" scope="col">Member since</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      </div>
    </div>

  </div>
</main>

<script>
(function () {
  'use strict';

  function show(which) {
    ['loading', 'denied', 'admin'].forEach(function (s) {
      document.getElementById(s).classList.toggle('on', s === which);
    });
  }

  function loadSession() {
    try { return JSON.parse(sessionStorage.getItem('nable-session') || 'null'); }
    catch (e) { return null; }
  }

  function fmtDate(unix) {
    if (!unix) return '-';
    try { return new Date(unix * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch (e) { return '-'; }
  }

  function fmtMoney(n) {
    return '$' + (Number(n) || 0).toLocaleString();
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function hostingPill(mode, status) {
    if (mode === 'hosted') {
      return status === 'requested'
        ? '<span class="pill req">Requested</span>'
        : '<span class="pill req">Managed</span>';
    }
    if (mode === 'self') return '<span class="pill self">Self</span>';
    return '<span class="pill">-</span>';
  }

  function render(data) {
    const t = data.totals || {};
    document.getElementById('admin-sub').textContent =
      t.count + ' customers · ' + (t.paying || 0) + ' paying · ' + (t.hosting_requested || 0) + ' hosting requests' +
      (data.truncated ? ' · showing first ' + t.count + ', totals partial' : '');

    document.getElementById('stat-strip').innerHTML = [
      ['v', fmtMoney(t.mrr), 'MRR'],
      ['v', t.paying || 0, 'Paying'],
      ['v', t.trials || 0, 'Trials'],
      ['v', t.count || 0, 'Total accounts'],
      ['v', t.hosting_requested || 0, 'Hosting requests'],
    ].map(function (s) {
      return '<div class="stat"><div class="v">' + esc(s[1]) + '</div><div class="k">' + esc(s[2]) + '</div></div>';
    }).join('');

    document.getElementById('rows').innerHTML = (data.customers || []).map(function (c) {
      const planClass = ['team', 'pro', 'trial'].indexOf(c.plan) >= 0 ? c.plan : '';
      return '<tr>' +
        '<td class="email">' + esc(c.email) + '</td>' +
        '<td><span class="pill ' + planClass + '">' + esc(c.plan) + '</span></td>' +
        '<td>' + esc(c.status) + '</td>' +
        '<td class="num">' + (c.mrr ? fmtMoney(c.mrr) : '-') + '</td>' +
        '<td>' + hostingPill(c.hosting_mode, c.hosting_status) + (c.hosting_mode === 'hosted' && c.hosting_cloud ? ' <span class="sub" style="font-size:11px">' + esc(c.hosting_cloud) + '</span>' : '') + '</td>' +
        '<td class="hide-sm sub" style="font-size:12px">' + fmtDate(c.created) + '</td>' +
        '</tr>';
    }).join('') || '<tr><td colspan="6" class="sub" style="padding:20px 12px">No customers yet.</td></tr>';

    show('admin');
  }

  async function init() {
    show('loading');
    const sess = loadSession();
    if (!sess || !sess.token) {
      document.getElementById('denied-msg').textContent = 'You are not signed in. Sign in with an admin account first.';
      show('denied');
      return;
    }
    try {
      const res = await fetch('/api/account/admin-customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: sess.token }),
      });
      const data = await res.json();
      if (res.status === 403) {
        document.getElementById('denied-msg').textContent = 'This account is not an admin.';
        show('denied');
        return;
      }
      if (!res.ok) {
        document.getElementById('denied-msg').textContent = data.error || 'Could not load customers.';
        show('denied');
        return;
      }
      render(data);
    } catch (e) {
      document.getElementById('denied-msg').textContent = 'Could not load customers. Try again.';
      show('denied');
    }
  }

  init();
})();
</script>
</body>
