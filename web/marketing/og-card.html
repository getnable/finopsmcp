<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- Source template for web/og.png (1200x630 social share card). Regenerate:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless=new \
       --force-device-scale-factor=1 --window-size=1200,630 --virtual-time-budget=8000 \
       --screenshot="web/og.png" "file://$PWD/web/marketing/og-card.html" -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .card{width:1200px;height:630px;background:#0d0f10;display:flex;flex-direction:column;padding:74px 80px;font-family:'Geist',system-ui,sans-serif}
  .brand{display:flex;align-items:center;gap:18px}
  .logo{width:54px;height:54px}
  .logo svg{width:100%;height:100%;display:block}
  .wm{font-size:29px;font-weight:500;color:#e6ebed;letter-spacing:-.01em}
  .mid{margin-top:62px}
  h1{font-size:80px;font-weight:700;line-height:1.04;letter-spacing:-.03em;color:#f0f2f3}
  .accent{color:#4db8d4}
  .sub{font-size:27px;font-weight:400;line-height:1.32;color:#94a3ab;margin-top:30px;letter-spacing:-.005em}
  .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .url{font-family:'JetBrains Mono',monospace;font-size:18px;color:#56656d;letter-spacing:.02em}
  .chip{font-family:'JetBrains Mono',monospace;font-size:17px;color:#8a99a0;border:1px solid #2e3539;border-radius:8px;padding:12px 18px;letter-spacing:.01em}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="logo"><svg viewBox="0 0 120 120"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5cc1da"/><stop offset="1" stop-color="#3a9ab6"/></linearGradient></defs><rect width="120" height="120" rx="27" fill="url(#g)"/><path d="M44 80 L44 56 A16 16 0 0 1 76 56 L76 80" fill="none" stroke="#0d0f10" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="wm">nable</div></div>
  <div class="mid">
    <h1>FinOps that lives in<br/><span class="accent">your AI editor.</span></h1>
    <p class="sub">Ask what’s driving your AWS, Azure, GCP and AI bill.<br/>Local-first, no backend.</p>
  </div>
  <div class="foot">
    <span class="url">getnable.com</span>
    <span class="chip">local-first · no backend</span>
  </div>
</div>
</body>
</html>
