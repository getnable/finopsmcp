name: Budget Gate (copy this to your own repo)

# ─────────────────────────────────────────────────────────────────────────────
# Copy this file into YOUR repo at .github/workflows/budget-check.yml
# It will check spend against your budget.yml on every PR.
#
# Add budget.yml to your repo root (see format below).
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.yaml"
      - "**.yml"
      - "budget.yml"
  schedule:
    - cron: "0 9 * * 1"     # Weekly Monday check

jobs:
  budget-gate:
    name: Check Budgets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: nable Budget Check
        uses: nable-finops/nable/.github/actions/budget-check@main
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          budget-yaml-path: budget.yml
          fail-on-exceeded: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# budget.yml format (add to your repo root):
#
# budgets:
#   - name: Total AWS Monthly
#     scope_type: total
#     period: monthly
#     limit_usd: 100000
#     alert_at_pct: 80
#     block_at_pct: 110
#
#   - name: Platform Team
#     scope_type: team
#     scope_value: platform
#     period: monthly
#     limit_usd: 15000
#     alert_at_pct: 75
#
#   - name: EC2 Compute
#     scope_type: service
#     scope_value: "Amazon Elastic Compute Cloud - Compute"
#     period: monthly
#     limit_usd: 25000
# ─────────────────────────────────────────────────────────────────────────────
