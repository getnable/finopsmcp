<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<meta property="og:description" content="Connect your AI to real cloud and SaaS billing data. AWS, Azure, GCP, Datadog, Snowflake and 8 more. No dashboards. No SQL." />
<meta property="og:url" content="https://nable.sh" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="nable" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="nable · cost intelligence, reimagined" />
<meta name="twitter:description" content="Connect your AI to real cloud and SaaS billing data. AWS, Azure, GCP, Datadog, Snowflake and 8 more." />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg);font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px;letter-spacing:-0.005em}
  :root{
    --bg:#fbfaf7;
    --bg-2:#f4f2ec;
    --bg-3:#ebe8e0;
    --fg:#1a1915;
    --fg-2:#54524a;
    --fg-3:#8b8879;
    --fg-4:#c1bdaf;
    --line:#e6e2d6;
    --line-2:#d9d4c4;
    --accent:#1a1915;
    --accent-ink:#fbfaf7;
    --hl:#3b6e3a;     /* very subdued green for status only */
    --alert:#b8533a;  /* subdued rust for anomalies */
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --r:6px;
  }
  ::selection{background:#1a1915;color:#fbfaf7}
  a{color:inherit;text-decoration:none}
  .mono{font-family:var(--mono)}
  .num{font-family:var(--mono);font-feature-settings:"tnum"}

  /* layout */
  .wrap{max-width:1140px;margin:0 auto;padding:0 32px}

  /* nav */
  .nav{position:sticky;top:0;z-index:50;background:color-mix(in oklab,var(--bg) 86%,transparent);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:500;letter-spacing:-.02em;font-size:16px}
  .logo .glyph{width:18px;height:18px;border-radius:5px;background:var(--fg);display:grid;place-items:center;color:var(--bg);font-weight:600;font-size:11px;line-height:1}
  .nav ul{display:flex;list-style:none;gap:28px;color:var(--fg-2);font-size:14px}
  .nav ul a:hover{color:var(--fg)}
  .nav .right{display:flex;gap:10px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:6px;font-size:13.5px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:.15s;letter-spacing:-.005em}
  .btn-primary{background:var(--fg);color:var(--bg)}
  .btn-primary:hover{background:#000}
  .btn-ghost{color:var(--fg-2);border-color:var(--line)}
  .btn-ghost:hover{color:var(--fg);border-color:var(--line-2);background:var(--bg-2)}
  /* theme toggle */
  .theme-tog{background:transparent;border:0;padding:6px;cursor:pointer;color:var(--fg-3);display:inline-flex;align-items:center;border-radius:999px}
  .theme-tog:hover{color:var(--fg)}
  .theme-tog-track{position:relative;display:inline-flex;align-items:center;justify-content:space-between;width:46px;height:22px;border:1px solid var(--line);border-radius:999px;background:var(--bg-2);padding:0 5px}
  .theme-tog-sun,.theme-tog-moon{display:inline-flex;align-items:center;justify-content:center;width:12px;height:12px;color:var(--fg-3);transition:color .2s}
  .theme-tog-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--fg);transition:transform .22s ease}
  .theme-tog-knob.on{transform:translateX(22px)}
  .btn .arr{transition:transform .18s}
  .btn:hover .arr{transform:translateX(2px)}

  /* type */
  h1,h2,h3,h4{font-weight:500;letter-spacing:-.025em;color:var(--fg)}
  h1{font-size:clamp(40px,5.6vw,68px);line-height:1.04;letter-spacing:-.035em;font-weight:400}
  h2{font-size:clamp(30px,3.6vw,44px);line-height:1.08;letter-spacing:-.03em;font-weight:400}
  h3{font-size:18px}
  p{color:var(--fg-2);line-height:1.6}
  .label{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);letter-spacing:.02em}

  /* hero */
  .hero{padding:84px 0 80px}
  .hero .lede{margin-top:24px;font-size:17px;max-width:50ch;color:var(--fg-2);line-height:1.55}
  .hero-cta{margin-top:32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .install{display:inline-flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:7px;padding:8px 12px;font-family:var(--mono);font-size:13px;color:var(--fg-2);background:var(--bg)}
  .install .prompt{color:var(--fg-3)}
  .install button{margin-left:4px;border:1px solid var(--line);border-radius:5px;background:transparent;color:var(--fg-3);padding:2px 8px;font-family:var(--mono);font-size:11px;cursor:pointer}
  .install button:hover{color:var(--fg);border-color:var(--line-2)}
  .clients{margin-top:64px;display:flex;align-items:center;gap:28px;flex-wrap:wrap;color:var(--fg-3);font-size:13px}
  .clients .l{font-family:var(--mono);font-size:11.5px;color:var(--fg-4);letter-spacing:.04em}
  .clients .c{display:inline-flex;align-items:center;gap:8px;color:var(--fg-2)}
  .clients .c::before{content:"";width:14px;height:14px;border-radius:3px;background:var(--bg-3);border:1px solid var(--line)}

  /* terminal */
  .terminal{margin-top:56px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg);box-shadow:0 1px 0 rgba(0,0,0,.02),0 16px 40px -22px rgba(0,0,0,.12)}
  .term-bar{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--bg-2)}
  .term-bar .dots{display:flex;gap:6px}
  .term-bar .dots i{width:9px;height:9px;border-radius:50%;background:var(--line-2)}
  .term-title{margin-left:6px;font-family:var(--mono);font-size:11.5px;color:var(--fg-3)}
  .term-status{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--fg-3)}
  .term-status .dot{width:6px;height:6px;border-radius:50%;background:var(--hl)}
  .term-body{padding:30px 36px;display:flex;flex-direction:column;gap:22px}
  .msg{display:flex;gap:14px;align-items:flex-start}
  .av{font-family:var(--mono);font-size:11px;color:var(--fg-3);min-width:34px;padding-top:3px;letter-spacing:.04em;text-transform:uppercase}
  .bubble{flex:1}
  .bubble p{color:var(--fg);font-size:14.5px;line-height:1.6}
  .bubble.user p{color:var(--fg-2)}
  .bubble .table{margin-top:14px;font-family:var(--mono);font-size:13px;display:flex;flex-direction:column}
  .bubble .table .r{display:grid;grid-template-columns:1fr auto auto;gap:24px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:center}
  .bubble .table .r:last-child{border-bottom:0}
  .bubble .table .r.hd{color:var(--fg-3);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;border-bottom-style:solid}
  .bubble .table .r .delta{color:var(--fg-3)}
  .bubble .table .r .delta.up{color:var(--alert)}
  .bubble .table .r .delta.down{color:var(--hl)}
  .bubble .table .r.total{padding-top:12px;border-bottom:0}
  .bubble .table .r.total b{color:var(--fg)}
  .anomaly{display:inline-flex;align-items:center;gap:6px;color:var(--alert);font-family:var(--mono);font-size:11.5px;letter-spacing:.04em}
  .anomaly::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--alert)}

  /* sections */
  section{padding:96px 0;border-top:1px solid var(--line)}
  .section-head{margin-bottom:48px;max-width:760px}
  .section-head .label{display:block;margin-bottom:14px}
  .section-head h2{margin-bottom:14px}
  .section-head p{font-size:16px;max-width:56ch}

  /* steps */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--line)}
  .step{padding:28px 28px 28px 0;border-right:1px solid var(--line)}
  .step:nth-child(1){padding-left:0}
  .step:nth-child(4){border-right:0;padding-right:0}
  .step:not(:nth-child(1)){padding-left:28px}
  .step .n{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);letter-spacing:.04em;margin-bottom:18px}
  .step h3{margin-bottom:6px;font-size:16px;font-weight:500}
  .step p{font-size:14px}
  .step .cmd{margin-top:18px;font-family:var(--mono);font-size:12.5px;color:var(--fg-2)}
  .step .cmd .c{color:var(--fg-3)}

  /* config */
  .config{margin-top:36px}
  .codecard{border:1px solid var(--line);border-radius:10px;background:var(--bg);overflow:hidden}
  .codecard .hd{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--fg-3);background:var(--bg-2)}
  .codecard pre{padding:20px 22px;font-family:var(--mono);font-size:13px;line-height:1.75;color:var(--fg);overflow:auto}
  .codecard .k{color:var(--fg)}
  .codecard .s{color:var(--alert)}
  .codecard .c{color:var(--fg-3)}

  /* features */
  .features{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--line)}
  .feature{padding:36px 36px 36px 0;border-bottom:1px solid var(--line);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:14px}
  .feature:nth-child(2n){border-right:0;padding-right:0;padding-left:36px}
  .feature:nth-last-child(-n+2){border-bottom:0}
  .feature .num{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);letter-spacing:.04em}
  .feature h3{font-size:22px;font-weight:500;letter-spacing:-.02em;line-height:1.2;color:var(--fg)}
  .feature p{font-size:14.5px;line-height:1.6;max-width:46ch}

  /* connectors */
  .connectors{border-top:1px solid var(--line)}
  .conn-row{display:grid;grid-template-columns:200px 1fr 110px 110px;padding:18px 0;border-bottom:1px solid var(--line);align-items:center;font-size:14px}
  .conn-row .name{color:var(--fg);letter-spacing:-.01em;font-weight:500}
  .conn-row .meta{font-family:var(--mono);font-size:13px;color:var(--fg-2)}
  .conn-row .ret{font-family:var(--mono);font-size:12px;color:var(--fg-3)}
  .badge{font-family:var(--mono);font-size:11.5px;letter-spacing:.02em}
  .badge.ok::before, .badge.warn::before, .badge.partial::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:7px;vertical-align:1px}
  .badge.ok{color:var(--fg)}
  .badge.ok::before{background:var(--hl)}
  .badge.warn{color:var(--fg-2)}
  .badge.warn::before{background:var(--alert);opacity:.8}
  .badge.partial{color:var(--fg-3)}
  .badge.partial::before{background:var(--fg-4)}

  /* security */
  .pull blockquote{font-size:clamp(26px,3vw,38px);line-height:1.25;letter-spacing:-.025em;font-weight:400;color:var(--fg);max-width:36ch}
  .pull p{margin-top:24px;font-size:15.5px;max-width:60ch;line-height:1.65}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:32px}
  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--fg-2);font-family:var(--mono)}

  /* pricing */
  .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .price{padding:36px 32px 36px 0;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:22px}
  .price:not(:first-child){padding-left:32px}
  .price:last-child{border-right:0;padding-right:0}
  .price .tier{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--fg-3);text-transform:uppercase}
  .price .amt{font-size:46px;line-height:1;letter-spacing:-.03em;font-weight:400;color:var(--fg)}
  .price .amt .small{font-size:22px;color:var(--fg-3)}
  .price .amt-sub{font-size:13px;color:var(--fg-3);margin-top:8px;font-family:var(--mono)}
  .price ul{list-style:none;display:flex;flex-direction:column;gap:9px;font-size:14px;color:var(--fg-2)}
  .price ul li{display:flex;gap:10px;line-height:1.5}
  .price ul li::before{content:"·";color:var(--fg-3);width:8px;text-align:center}
  .price ul li.locked{color:var(--fg-4)}
  .price ul li.locked::before{content:"·"}
  .price .cta{margin-top:auto;padding-top:8px}
  .price .cta a{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--fg);border-bottom:1px solid var(--line)}
  .price .cta a:hover{border-bottom-color:var(--fg)}
  .price.feat{background:var(--bg-2);margin:0 -1px;border-left:1px solid var(--line);padding-left:32px;padding-right:32px}
  .price.feat .cta a{color:var(--fg);font-weight:500}

  /* CTA */
  .cta{padding:120px 0 110px;border-top:1px solid var(--line)}
  .cta h2{max-width:18ch;margin-bottom:22px}
  .cta .row{display:grid;grid-template-columns:1.4fr 1fr;gap:80px;align-items:end}
  .cta-form .lab{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);letter-spacing:.02em;margin-bottom:12px}
  .cta-form .field{display:flex;gap:8px;border-bottom:1px solid var(--fg);padding-bottom:8px}
  .cta-form input{flex:1;background:transparent;border:0;color:var(--fg);padding:6px 0;font-family:'Geist',sans-serif;font-size:16px;outline:none}
  .cta-form input::placeholder{color:var(--fg-3)}
  .cta-form .submit{background:transparent;border:0;color:var(--fg);font-size:14px;cursor:pointer;padding:0 4px;display:inline-flex;align-items:center;gap:6px}
  .cta-form .helper{margin-top:14px;font-size:12.5px;color:var(--fg-3)}

  /* Trial modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
  .modal{background:var(--bg);border:1px solid var(--line);border-radius:12px;width:100%;max-width:780px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
  .modal-left{padding:44px 40px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:28px}
  .modal-left h3{font-size:22px;font-weight:400;letter-spacing:-.02em;line-height:1.2}
  .modal-left .price-row{display:flex;align-items:baseline;gap:6px}
  .modal-left .price-big{font-size:42px;font-weight:400;letter-spacing:-.03em}
  .modal-left .price-after{font-size:13px;color:var(--fg-3);font-family:var(--mono)}
  .modal-left ul{list-style:none;display:flex;flex-direction:column;gap:8px;font-size:13.5px;color:var(--fg-2)}
  .modal-left ul li::before{content:"·";margin-right:10px;color:var(--fg-4)}
  .modal-right{padding:44px 40px;display:flex;flex-direction:column;gap:20px}
  .modal-right h4{font-size:15px;font-weight:500;letter-spacing:-.01em}
  .modal-right label{font-family:var(--mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em;display:block;margin-bottom:6px}
  .modal-right input[type=email]{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:10px 12px;font-family:'Geist',sans-serif;font-size:14px;color:var(--fg);outline:none}
  .modal-right input[type=email]:focus{border-color:var(--fg-2)}
  .modal-right .modal-submit{width:100%;background:var(--fg);color:var(--bg);border:0;border-radius:6px;padding:11px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
  .modal-right .modal-submit:hover{background:#000}
  .modal-right .modal-note{font-size:11.5px;color:var(--fg-3);line-height:1.5;font-family:var(--mono)}
  .modal-pip{margin-top:auto;padding-top:20px;border-top:1px solid var(--line)}
  .modal-pip .step-label{font-family:var(--mono);font-size:10.5px;color:var(--fg-4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .modal-pip .install{font-family:var(--mono);font-size:12.5px;color:var(--fg-2);background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:10px}
  .modal-pip .install .prompt{color:var(--fg-4)}
  .modal-close{position:absolute;top:16px;right:18px;background:transparent;border:0;font-size:20px;cursor:pointer;color:var(--fg-3);line-height:1}
  .modal-close:hover{color:var(--fg)}
  @media(max-width:640px){.modal{grid-template-columns:1fr}.modal-left{border-right:0;border-bottom:1px solid var(--line);padding:32px 24px}.modal-right{padding:32px 24px}}

  /* footer */
  footer{border-top:1px solid var(--line);padding:36px 0 56px}
  .foot{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:36px}
  .foot h5{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);letter-spacing:.02em;margin-bottom:14px;font-weight:400}
  .foot a{display:block;color:var(--fg-2);font-size:14px;padding:3px 0}
  .foot a:hover{color:var(--fg)}
  .foot-bottom{margin-top:48px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--fg-3);padding-top:18px;border-top:1px solid var(--line)}

  @media (max-width:920px){
    .features{grid-template-columns:1fr}
    .feature{border-right:0;padding-right:0;padding-left:0!important;padding-top:32px;padding-bottom:32px}
    .steps{grid-template-columns:1fr 1fr}
    .step{padding:24px!important;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .step:nth-child(2n){border-right:0}
    .step:nth-last-child(-n+2){border-bottom:0}
    .pricing{grid-template-columns:1fr}
    .price{padding:32px 0!important;border-right:0;border-bottom:1px solid var(--line)}
    .price.feat{margin:0;padding:32px 0!important;border-left:0}
    .price:last-child{border-bottom:0}
    .conn-row{grid-template-columns:1fr 110px;}
    .conn-row .meta,.conn-row .ret{display:none}
    .nav ul{display:none}
    .cta .row{grid-template-columns:1fr;gap:48px}
    .foot{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<div id="app"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "linen",
  "accentMode": "neutral"
}/*EDITMODE-END*/;

const PALETTES = {
  linen:    { bg:"#fbfaf7", bg2:"#f4f2ec", bg3:"#ebe8e0", fg:"#1a1915", fg2:"#54524a", fg3:"#8b8879", fg4:"#c1bdaf", line:"#e6e2d6", line2:"#d9d4c4" },
  paper:    { bg:"#ffffff", bg2:"#f7f7f5", bg3:"#eeeeea", fg:"#161616", fg2:"#525252", fg3:"#8a8a85", fg4:"#c4c4be", line:"#ebebe6", line2:"#dedeD8" },
  graphite: { bg:"#15140f", bg2:"#1c1a14", bg3:"#23211a", fg:"#f3efe6", fg2:"#bbb6a4", fg3:"#7e7a6c", fg4:"#4a4639", line:"#262318", line2:"#33301f" },
};
const ACCENTS = {
  neutral: { hl:"#3b6e3a", alert:"#b8533a" },
  forest:  { hl:"#2f5f2e", alert:"#9d4630" },
  cobalt:  { hl:"#365a9b", alert:"#b8533a" },
};

function applyTheme(t){
  const r = document.documentElement;
  const p = PALETTES[t.palette] || PALETTES.linen;
  const a = ACCENTS[t.accentMode] || ACCENTS.neutral;
  r.style.setProperty('--bg', p.bg);
  r.style.setProperty('--bg-2', p.bg2);
  r.style.setProperty('--bg-3', p.bg3);
  r.style.setProperty('--fg', p.fg);
  r.style.setProperty('--fg-2', p.fg2);
  r.style.setProperty('--fg-3', p.fg3);
  r.style.setProperty('--fg-4', p.fg4);
  r.style.setProperty('--line', p.line);
  r.style.setProperty('--line-2', p.line2);
  r.style.setProperty('--hl', a.hl);
  r.style.setProperty('--alert', a.alert);
  r.style.setProperty('--accent', p.fg);
  r.style.setProperty('--accent-ink', p.bg);
}

function App(){

  const [modalOpen, setModalOpen] = useState(false);
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ applyTheme(t); },[t]);
  const dark = t.palette === "graphite";
  const toggle = () => setTweak("palette", dark ? "linen" : "graphite");
  useEffect(()=>{
    function onMsg(e){
      const d = e.data || {};
      if(d.type === "__activate_edit_mode") setTweaksOpen(true);
      if(d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", onMsg);
  },[]);
  const openModal = (e) => { e.preventDefault(); setModalOpen(true); };
  return (
    <>
      <Nav dark={dark} onToggle={toggle} onTrial={openModal} />
      <Hero onTrial={openModal} />

      <Features />
      <Connectors />
      <Security />
      <Pricing onTrial={openModal} />
      <CTA />
      <Footer />
      <Tweaks open={tweaksOpen} t={t} setTweak={setTweak} />
      {modalOpen && <TrialModal onClose={()=>setModalOpen(false)} />}
    </>
  );
}
