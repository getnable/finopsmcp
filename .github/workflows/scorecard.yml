name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1"   # weekly, Monday — scorecard is periodic, not per-commit
  workflow_dispatch:        # allow manual runs (e.g. to validate a fix)

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish results to the public scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # required for the README badge

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          sarif_file: results.sarif
