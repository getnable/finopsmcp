<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>nable — cloud cost intelligence for your AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg);font-family:'Geist','Inter',system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px}
  :root{
    --bg:#0e0d0b;
    --bg-2:#15140f;
    --bg-3:#1c1a14;
    --fg:#f3efe6;
    --fg-2:#cdc6b4;
    --fg-3:#807a6b;
    --fg-4:#4a4639;
    --line:#27241c;
    --line-2:#33301f;
    --accent:#9bd17a;          /* oklch(0.82 0.14 140) */
    --accent-ink:#0e0d0b;
    --warn:#e7a274;            /* oklch(0.78 0.11 60) */
    --alert:#e98060;           /* oklch(0.74 0.15 35) */
    --serif:'Instrument Serif',Georgia,serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --r:6px;
  }
  ::selection{background:var(--accent);color:var(--accent-ink)}
  a{color:inherit;text-decoration:none}
  hr{border:0;border-top:1px solid var(--line)}
  .mono{font-family:var(--mono);font-feature-settings:"calt","ss01"}
  .serif{font-family:var(--serif)}
  .it{font-style:italic}
  .micro{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3)}
  .num{font-family:var(--mono);font-feature-settings:"tnum"}

  /* layout */
  .wrap{max-width:1200px;margin:0 auto;padding:0 28px}
  .grid{display:grid;gap:24px}
  .row{display:flex;align-items:center;gap:14px}
  .col{display:flex;flex-direction:column}
  .between{justify-content:space-between}
  .hairline{border-top:1px solid var(--line)}
  .vline{border-left:1px solid var(--line)}

  /* nav */
  .nav{position:sticky;top:0;z-index:50;background:color-mix(in oklab,var(--bg) 78%,transparent);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em}
  .logo .glyph{width:22px;height:22px;border-radius:5px;background:var(--accent);display:grid;place-items:center;color:var(--accent-ink);font-family:var(--serif);font-style:italic;font-size:18px;line-height:1}
  .nav ul{display:flex;list-style:none;gap:26px;color:var(--fg-2);font-size:13.5px}
  .nav ul a:hover{color:var(--fg)}
  .nav .right{display:flex;gap:10px;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--fg-2)}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px color-mix(in oklab,var(--accent) 22%,transparent)}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:7px;font-size:13.5px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:.18s}
  .btn-primary{background:var(--accent);color:var(--accent-ink)}
  .btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn-ghost{color:var(--fg-2);border-color:var(--line)}
  .btn-ghost:hover{color:var(--fg);border-color:var(--line-2)}
  .btn .arr{transition:transform .2s}
  .btn:hover .arr{transform:translateX(2px)}

  /* ticker */
  .ticker{border-bottom:1px solid var(--line);overflow:hidden;background:var(--bg);position:relative}
  .ticker-track{display:flex;gap:48px;padding:9px 0;white-space:nowrap;animation:scrollx 60s linear infinite;font-family:var(--mono);font-size:12px;color:var(--fg-3)}
  .ticker-track b{color:var(--fg-2);font-weight:500;letter-spacing:.02em;margin-right:8px}
  .ticker-track .up{color:var(--alert)}
  .ticker-track .down{color:var(--accent)}
  @keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* hero */
  .hero{padding:80px 0 56px;position:relative}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:30px}
  .eyebrow .bar{width:24px;height:1px;background:var(--fg-3);display:inline-block}
  h1.headline{font-family:var(--serif);font-weight:400;font-size:clamp(56px,8vw,116px);line-height:.95;letter-spacing:-.02em;color:var(--fg);max-width:14ch}
  h1.headline em{font-style:italic;color:var(--accent)}
  h1.headline .strike{color:var(--fg-3);text-decoration:line-through;text-decoration-thickness:1px;text-decoration-color:var(--alert)}
  .lede{font-size:18px;color:var(--fg-2);max-width:46ch;margin-top:34px;line-height:1.55}
  .hero-cta{display:flex;align-items:center;gap:14px;margin-top:34px;flex-wrap:wrap}
  .install{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:8px;padding:9px 14px;font-family:var(--mono);font-size:13px;color:var(--fg-2)}
  .install .prompt{color:var(--accent)}
  .install button{margin-left:6px;border:1px solid var(--line);border-radius:5px;background:transparent;color:var(--fg-3);padding:3px 8px;font-family:var(--mono);font-size:11px;cursor:pointer}
  .install button:hover{color:var(--fg);border-color:var(--line-2)}

  /* hero stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:64px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .stat{padding:24px 22px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:0}
  .stat .v{font-family:var(--serif);font-size:44px;line-height:1;letter-spacing:-.02em;color:var(--fg)}
  .stat .v em{font-style:italic;color:var(--accent)}
  .stat .l{margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em}

  /* terminal */
  .terminal{margin-top:56px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg-2);box-shadow:0 30px 80px -30px rgba(0,0,0,.6),0 0 0 1px color-mix(in oklab,var(--accent) 6%,transparent) inset}
  .term-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg-3),var(--bg-2))}
  .term-bar .dots{display:flex;gap:6px}
  .term-bar .dots i{width:9px;height:9px;border-radius:50%;background:var(--line-2)}
  .term-bar .dots i:nth-child(1){background:#3a3528}
  .term-bar .dots i:nth-child(2){background:#3a3528}
  .term-bar .dots i:nth-child(3){background:#3a3528}
  .term-title{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);letter-spacing:.04em}
  .term-status{margin-left:auto;display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--fg-3)}
  .term-status .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .term-body{padding:0;display:grid;grid-template-columns:200px 1fr;min-height:430px}
  .term-side{border-right:1px solid var(--line);padding:18px 14px;background:var(--bg-2)}
  .term-side .group{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;color:var(--fg-4);letter-spacing:.08em;margin:14px 8px 8px}
  .term-side .group:first-child{margin-top:0}
  .term-side .item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border-radius:5px;font-size:12.5px;color:var(--fg-2);font-family:var(--mono);cursor:pointer}
  .term-side .item:hover{background:var(--bg-3);color:var(--fg)}
  .term-side .item.active{background:var(--bg-3);color:var(--fg)}
  .term-side .item .num{color:var(--fg-3);font-size:11px}
  .term-side .item .ok{color:var(--accent)}
  .term-chat{padding:22px 26px;display:flex;flex-direction:column;gap:18px;font-size:14px}
  .msg{display:flex;gap:14px;align-items:flex-start}
  .av{width:24px;height:24px;border-radius:5px;flex:0 0 auto;display:grid;place-items:center;font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.05em;margin-top:2px}
  .av.user{background:var(--bg-3);color:var(--fg-2)}
  .av.ai{background:color-mix(in oklab,var(--accent) 18%,var(--bg-2));color:var(--accent)}
  .bubble{flex:1;color:var(--fg)}
  .bubble.user{color:var(--fg-2)}
  .bubble .who{font-family:var(--mono);font-size:10.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .bubble p{line-height:1.6}
  .bubble .table{margin-top:12px;border:1px solid var(--line);border-radius:7px;overflow:hidden;font-family:var(--mono);font-size:12.5px}
  .bubble .table .r{display:grid;grid-template-columns:1fr auto auto;gap:14px;padding:8px 14px;border-bottom:1px solid var(--line);align-items:center}
  .bubble .table .r:last-child{border-bottom:0}
  .bubble .table .r.hd{background:var(--bg-3);color:var(--fg-3);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em}
  .bubble .table .r .delta{color:var(--fg-3)}
  .bubble .table .r .delta.up{color:var(--alert)}
  .bubble .table .r .delta.down{color:var(--accent)}
  .bubble .table .r.total{background:linear-gradient(180deg,transparent,color-mix(in oklab,var(--accent) 7%,transparent))}
  .bubble .table .r.total b{color:var(--fg)}
  .anomaly{display:inline-flex;align-items:center;gap:6px;background:color-mix(in oklab,var(--alert) 12%,var(--bg-2));border:1px solid color-mix(in oklab,var(--alert) 30%,var(--line));color:var(--alert);padding:2px 9px;border-radius:4px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .anomaly::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--alert);box-shadow:0 0 6px var(--alert)}
  .input-row{margin-top:auto;border-top:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:13px;color:var(--fg-3);background:var(--bg-2)}
  .input-row .caret{color:var(--accent);animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* section */
  section{padding:96px 0;border-top:1px solid var(--line)}
  .section-head{display:grid;grid-template-columns:280px 1fr;gap:48px;align-items:flex-start;margin-bottom:48px}
  .section-head .label{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em}
  .section-head h2{font-family:var(--serif);font-weight:400;font-size:clamp(36px,4.6vw,60px);line-height:1.02;letter-spacing:-.015em;max-width:18ch}
  .section-head h2 em{font-style:italic;color:var(--accent)}
  .section-head .sub{margin-top:18px;color:var(--fg-2);max-width:52ch;font-size:16px;line-height:1.55}

  /* how it works */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg-2)}
  .step{padding:26px 24px;border-right:1px solid var(--line);position:relative}
  .step:last-child{border-right:0}
  .step .n{font-family:var(--serif);font-style:italic;font-size:34px;color:var(--accent);line-height:1}
  .step h4{margin-top:14px;font-size:15px;font-weight:600;letter-spacing:-.005em}
  .step p{margin-top:6px;font-size:13.5px;color:var(--fg-2);line-height:1.55}
  .step .cmd{margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--fg-2);background:var(--bg-3);border:1px solid var(--line);border-radius:5px;padding:7px 10px}
  .step .cmd .c{color:var(--accent)}

  /* config */
  .config{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .codecard{border:1px solid var(--line);border-radius:10px;background:var(--bg-2);overflow:hidden}
  .codecard .hd{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em}
  .codecard pre{padding:18px 20px;font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--fg-2);overflow:auto}
  .codecard .k{color:var(--accent)}
  .codecard .s{color:var(--warn)}
  .codecard .c{color:var(--fg-4)}

  /* features */
  .features{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg-2)}
  .feature{padding:32px 28px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:14px;min-height:280px}
  .feature:nth-child(3n){border-right:0}
  .feature:nth-last-child(-n+3){border-bottom:0}
  .feature .ix{display:flex;align-items:center;justify-content:space-between}
  .feature .ix .ix-num{font-family:var(--mono);font-size:11px;color:var(--fg-4);letter-spacing:.06em}
  .feature .ix .pip{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .feature h4{font-family:var(--serif);font-size:26px;font-weight:400;line-height:1.05;letter-spacing:-.01em}
  .feature h4 em{font-style:italic;color:var(--accent)}
  .feature p{color:var(--fg-2);font-size:14px;line-height:1.55}
  .feature .data{margin-top:auto;border-top:1px dashed var(--line);padding-top:14px;font-family:var(--mono);font-size:11.5px;color:var(--fg-3);display:flex;flex-direction:column;gap:5px}
  .feature .data .ln{display:flex;justify-content:space-between;gap:12px}
  .feature .data .ln b{color:var(--fg)}
  .feature .data .ln .red{color:var(--alert)}
  .feature .data .ln .grn{color:var(--accent)}
  .feature .data .ln .dim{color:var(--fg-4)}

  /* connectors */
  .connectors{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .conn-hd{display:grid;grid-template-columns:1.5fr 1fr 1fr 1.2fr 90px;padding:11px 18px;background:var(--bg-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10.5px;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase}
  .conn-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1.2fr 90px;padding:14px 18px;border-bottom:1px solid var(--line);align-items:center;font-size:13.5px;transition:background .15s}
  .conn-row:hover{background:var(--bg-2)}
  .conn-row:last-child{border-bottom:0}
  .conn-row .name{display:flex;align-items:center;gap:12px;color:var(--fg)}
  .conn-row .lg{width:22px;height:22px;border-radius:5px;background:var(--bg-3);display:grid;place-items:center;font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--fg-2)}
  .conn-row .meta{font-family:var(--mono);font-size:12px;color:var(--fg-2)}
  .conn-row .meta.dim{color:var(--fg-3)}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--line)}
  .badge.ok{background:color-mix(in oklab,var(--accent) 12%,transparent);color:var(--accent);border-color:color-mix(in oklab,var(--accent) 28%,var(--line))}
  .badge.warn{background:color-mix(in oklab,var(--warn) 10%,transparent);color:var(--warn);border-color:color-mix(in oklab,var(--warn) 26%,var(--line))}
  .badge.partial{background:transparent;color:var(--fg-3);border-color:var(--line)}

  /* security pull */
  .pull{padding:20px 0 0;display:grid;grid-template-columns:280px 1fr;gap:48px;align-items:start}
  .pull .marg{font-family:var(--mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em}
  .pull blockquote{font-family:var(--serif);font-weight:400;font-size:clamp(28px,3.2vw,42px);line-height:1.18;letter-spacing:-.012em;color:var(--fg);max-width:28ch}
  .pull blockquote em{font-style:italic;color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px}
  .chip{padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--fg-2);font-family:var(--mono)}

  /* pricing */
  .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .price{padding:36px 30px;border-right:1px solid var(--line);background:var(--bg-2);display:flex;flex-direction:column;gap:20px;position:relative}
  .price:last-child{border-right:0}
  .price.feat{background:linear-gradient(180deg,color-mix(in oklab,var(--accent) 9%,var(--bg-2)),var(--bg-2) 60%)}
  .price.feat::before{content:"";position:absolute;inset:0;pointer-events:none;border:1px solid color-mix(in oklab,var(--accent) 35%,transparent);border-radius:0}
  .price .tier{display:flex;align-items:center;justify-content:space-between}
  .price .tier .nm{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3)}
  .price .tier .nm.on{color:var(--accent)}
  .price .amt{font-family:var(--serif);font-size:64px;line-height:1;letter-spacing:-.02em}
  .price .amt em{font-style:italic;color:var(--accent)}
  .price .amt .small{font-size:24px;color:var(--fg-3);font-style:normal;font-family:var(--serif)}
  .price .amt-sub{font-size:13px;color:var(--fg-3);margin-top:6px;font-family:var(--mono)}
  .price ul{list-style:none;display:flex;flex-direction:column;gap:9px;font-size:13.5px;color:var(--fg-2)}
  .price ul li{display:flex;gap:10px}
  .price ul li::before{content:"+";color:var(--accent);font-family:var(--mono);font-weight:600}
  .price ul li.locked{color:var(--fg-4)}
  .price ul li.locked::before{content:"−";color:var(--fg-4)}
  .price .cta{margin-top:auto}
  .price .cta a{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:7px;padding:12px 14px;font-size:13.5px;color:var(--fg);transition:.15s}
  .price .cta a:hover{border-color:var(--line-2);background:var(--bg-3)}
  .price.feat .cta a{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  .price.feat .cta a:hover{filter:brightness(1.05)}

  /* CTA */
  .cta{padding:120px 0 110px;text-align:left;border-top:1px solid var(--line);position:relative;overflow:hidden}
  .cta::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 320px at 18% 50%,color-mix(in oklab,var(--accent) 10%,transparent),transparent 70%);pointer-events:none}
  .cta .inner{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
  .cta h2{font-family:var(--serif);font-size:clamp(48px,6vw,84px);line-height:.98;letter-spacing:-.02em;font-weight:400;max-width:14ch}
  .cta h2 em{font-style:italic;color:var(--accent)}
  .cta-form{border:1px solid var(--line);border-radius:10px;background:var(--bg-2);padding:22px}
  .cta-form .lab{font-family:var(--mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em}
  .cta-form .field{margin-top:14px;display:flex;gap:8px}
  .cta-form input{flex:1;background:var(--bg-3);border:1px solid var(--line);border-radius:7px;color:var(--fg);padding:11px 12px;font-family:'Geist',sans-serif;font-size:14px;outline:none}
  .cta-form input:focus{border-color:color-mix(in oklab,var(--accent) 50%,var(--line))}

const FONTS = {

};

function applyTheme(t){
  const r = document.documentElement;
  const p = PALETTES[t.palette] || PALETTES.obsidian;
  const a = ACCENTS[t.accent] || ACCENTS.lime;
  Object.entries(p).forEach(([k,v])=>r.style.setProperty(`--${k.replace(/([A-Z])/g,'-$1').toLowerCase()}`, v));
  // fix names
  r.style.setProperty('--bg', p.bg);
  r.style.setProperty('--bg-2', p.bg2);
  r.style.setProperty('--bg-3', p.bg3);
  r.style.setProperty('--fg', p.fg);
  r.style.setProperty('--fg-2', p.fg2);
  r.style.setProperty('--fg-3', p.fg3);
  r.style.setProperty('--fg-4', p.fg4);
  r.style.setProperty('--line', p.line);
  r.style.setProperty('--line-2', p.line2);
  r.style.setProperty('--accent', a.accent);
  r.style.setProperty('--accent-ink', a.ink);
  r.style.setProperty('--serif', FONTS[t.displayFont]||FONTS.instrument);
}

function Tweaks({ open }){
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ applyTheme(t); },[t]);
  if(!open) return null;
  return (
    <window.TweaksPanel title="Tweaks">
      <window.TweakSection title="Palette">
        <window.TweakRadio label="Background"
          value={t.palette}
          options={[
            {value:"obsidian",label:"Obsidian"},
            {value:"ink",label:"Ink"},
            {value:"parchment",label:"Parchment"},
          ]}
          onChange={(v)=>setTweak("palette",v)} />
      </window.TweakSection>
      <window.TweakSection title="Accent">
        <window.TweakColor
          label="Accent"
          value={t.accent}
          options={[
            {value:"lime",color:"#9bd17a"},
            {value:"amber",color:"#e6b25c"},
            {value:"electric",color:"#7aa6f5"},
            {value:"coral",color:"#e98060"},
          ]}
          onChange={(v)=>setTweak("accent",v)} />
      </window.TweakSection>
      <window.TweakSection title="Display font">
        <window.TweakRadio label="Display"
          value={t.displayFont}
          options={[
            {value:"instrument",label:"Instrument Serif"},
            {value:"geist",label:"Geist Sans"},
          ]}
          onChange={(v)=>setTweak("displayFont",v)} />
      </window.TweakSection>
    </window.TweaksPanel>
  );
}

function App(){
  const [tweaksOpen, setTweaksOpen] = useState(false);
  // initial theme
  useEffect(()=>{ applyTheme(TWEAK_DEFAULTS); },[]);
  // host protocol — register listener BEFORE announcing
  useEffect(()=>{
    function onMsg(e){
      const d = e.data || {};
      if(d.type === "__activate_edit_mode") setTweaksOpen(true);
      if(d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", onMsg);
  },[]);
  return (
    <>
      <Nav />
      <Ticker />
      <Hero />
      <HowItWorks />
      <Features />
      <Connectors />
      <Security />
      <Pricing />
      <CTA />
      <Footer />
      <Tweaks open={tweaksOpen} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
