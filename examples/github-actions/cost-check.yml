# Example: add this file to YOUR repo (not this one) to get cost estimates on every PR.
#
# Required secrets in your repo:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY   — for effective-rate detection
#   FINOPS_LICENSE_KEY                          — your nable Pro key (optional, trial works too)
#
# The action posts a comment like:
#
#   💰 nable cost estimate
#   | Resource              | Change  | Est. / month |
#   |-----------------------|---------|--------------|
#   | aws_db_instance · rds | ➕ add  | +$140        |
#   | aws_nat_gateway · nat | ➕ add  | +$45         |
#   |                       | Total   | +$185 / month|

name: Cost Check

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.yaml"
      - "**.yml"
      - "**/cloudformation/**"
      - "**/cdk/**"
      - "**/helm/**"
      - "**/k8s/**"

jobs:
  cost-check:
    name: Estimate cost impact
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # needed to post the PR comment

    steps:
      - uses: actions/checkout@v4

      - uses: chaandannn/finopsmcp/.github/actions/cost-check@main
        with:
          finops-license-key: ${{ secrets.FINOPS_LICENSE_KEY }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          threshold-usd: "10"    # only comment if impact > $10/month
