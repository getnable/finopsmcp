<!doctype html>
<!-- Font side-by-side for the hero. Temporary compare page, not linked, not committed.
     Usage: /font-compare.html?font=bricolage | geist | satoshi -->
<html lang="en"><head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3JM0X2KXHW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3JM0X2KXHW');
</script>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>font compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Geist:wght@100..900&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap">
<style>
:root{--bg:#000;--bg-1:#0a0a0c;--bg-2:#121214;--line:#232327;--line-2:#2d2d32;--fg:#f0f2f3;--fg-2:#94a3ab;--fg-3:#56656d;--accent:#4db8d4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
body[data-font="bricolage"]{font-family:'Bricolage Grotesque',system-ui,sans-serif}
body[data-font="geist"]{font-family:'Geist',system-ui,sans-serif}
body[data-font="satoshi"]{font-family:'Satoshi',system-ui,sans-serif}
.hero{max-width:900px;text-align:center;padding:40px;position:relative;background:radial-gradient(ellipse 70% 56% at 50% 40%, rgba(77,184,212,.055), transparent 66%)}
.fontlab{position:fixed;top:18px;left:18px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);border:1px solid var(--line-2);padding:6px 12px;border-radius:2px;background:var(--bg-1)}
h1{font-size:72px;line-height:1.03;letter-spacing:-.043em;font-weight:440}
body[data-font="satoshi"] h1{font-weight:500}
h1 .ask{display:block;color:var(--accent);font-weight:500}
.sub{margin:24px auto 0;max-width:58ch;font-size:18px;line-height:1.55;color:var(--fg-2);font-weight:400}
.actions{margin-top:38px;display:flex;align-items:center;justify-content:center;gap:14px}
.cmd{display:inline-flex;align-items:center;height:44px;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12.5px;overflow:hidden}
.cmd .p{padding:0 12px;color:var(--fg-3);border-right:1px solid var(--line);align-self:stretch;display:flex;align-items:center}
.cmd .c{padding:0 14px;color:var(--fg)}
.cmd .k{padding:0 14px;color:var(--fg-3);border-left:1px solid var(--line);font-size:10.5px;letter-spacing:.06em;align-self:stretch;display:flex;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;height:44px;padding:0 18px;border-radius:8px;font-size:13.5px;font-weight:500;background:var(--accent);color:var(--bg)}
.trust{margin-top:26px;font-size:13px;color:var(--fg-3)}
.trust b{color:var(--fg-2);font-weight:500}
</style></head>
<body>
<div class="fontlab" id="lab"></div>
<div class="hero">
  <h1>Stop guessing why cloud costs went up. <span class="ask">Ask.</span></h1>
  <p class="sub">Then it finds the waste, writes the fix for you to approve, and proves the savings on your next bill.</p>
  <div class="actions">
    <span class="cmd"><span class="p">$</span><span class="c">uvx nable</span><span class="k">COPY</span></span>
    <span class="btn">Get started free →</span>
  </div>
  <p class="trust">Every cloud + AI bill in <b>one place</b> · works in any editor · free for solo use</p>
</div>
<script>
const f = new URLSearchParams(location.search).get("font") || "bricolage";
document.body.dataset.font = f;
const names = {bricolage:"Bricolage Grotesque · current", geist:"Geist Sans · Vercel, OFL", satoshi:"Satoshi · Fontshare, free"};
document.getElementById("lab").textContent = names[f] || f;
</script>
</body></html>
