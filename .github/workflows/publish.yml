name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # needed for trusted publishing (OIDC)

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      # SHA-pinned to actions/checkout v4.2.2 — update via Ratchet or manual audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Set up Python
        # SHA-pinned to actions/setup-python v5.5.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.5.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        # SHA-pinned to pypa/gh-action-pypi-publish release/v1 head
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          # Uses PyPI Trusted Publishing (OIDC) — no token needed in secrets.
          # Set up at: https://pypi.org/manage/project/finops-mcp/settings/publishing/
          # Add GitHub Actions publisher:
          #   Owner: <your-github-org>
          #   Repository: finops
          #   Workflow: publish.yml
          skip-existing: true
