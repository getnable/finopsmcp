# nable (finops-mcp) org-wide read-only role.
# Deploy as a SERVICE-MANAGED StackSet at your Organizations root: it creates a
# strictly read-only FinOpsReadOnly role in every member account (and every future
# one) that your management account can assume. Generated from
# finops.security.iam_setup.org_stackset_template(); do not hand-edit.
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Org-wide least-privilege read-only role for nable (finops-mcp), one per member account via
  a StackSet. Strictly read-only: no create, modify, or delete of any kind. The management account assumes
  it to read each account''s resources for waste and rightsizing scans.'
Parameters:
  ManagementAccountId:
    Type: String
    AllowedPattern: ^[0-9]{12}$
    Description: The Organizations management (payer) account ID that nable runs from and that assumes
      this role.
  RoleName:
    Type: String
    Default: FinOpsReadOnly
    Description: Role name created in each member account. Must match what nable assumes (FINOPS_ORG_ROLE_NAME).
Resources:
  NableOrgReadOnlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: NableFinopsOrgReadOnlyPolicy
      Description: Exact read APIs nable needs in each member account, nothing more.
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: NableOrgReadOnly
          Effect: Allow
          Action:
          - ce:GetCostAndUsage
          - ce:GetCostForecast
          - ce:GetReservationUtilization
          - ce:GetReservationCoverage
          - ce:GetSavingsPlansPurchaseRecommendation
          - ce:GetSavingsPlansUtilization
          - ce:GetSavingsPlansUtilizationDetails
          - ce:GetSavingsPlansCoverage
          - ce:GetRightsizingRecommendation
          - ce:ListCostAllocationTags
          - ce:DescribeCostCategoryDefinition
          - compute-optimizer:GetEC2InstanceRecommendations
          - compute-optimizer:GetLambdaFunctionRecommendations
          - compute-optimizer:GetRDSDatabaseRecommendations
          - compute-optimizer:GetECSServiceRecommendations
          - compute-optimizer:GetEnrollmentStatus
          - compute-optimizer:GetRecommendationSummaries
          - cloudwatch:GetMetricData
          - cloudwatch:GetMetricStatistics
          - cloudwatch:ListMetrics
          - ec2:DescribeInstances
          - ec2:DescribeRegions
          - ec2:DescribeVolumes
          - ec2:DescribeSnapshots
          - ec2:DescribeAddresses
          - ec2:DescribeNatGateways
          - ec2:DescribeImages
          - elasticloadbalancing:DescribeLoadBalancers
          - rds:DescribeDBInstances
          - rds:DescribeDBSnapshots
          - lambda:ListFunctions
          - lambda:GetFunctionConfiguration
          - ecr:DescribeRepositories
          - ecr:DescribeImages
          - ecs:ListClusters
          - ecs:ListServices
          - ecs:DescribeServices
          - ecs:DescribeTaskDefinition
          - logs:DescribeLogGroups
          - logs:DescribeLogStreams
          - cloudtrail:DescribeTrails
          - cloudtrail:GetTrailStatus
          - cloudtrail:GetEventSelectors
          - s3:ListAllMyBuckets
          - s3:GetBucketLocation
          - s3:GetBucketIntelligentTieringConfiguration
          - s3:ListBucketMultipartUploads
          - s3:ListMultipartUploadParts
          - organizations:ListAccounts
          - organizations:ListRoots
          - organizations:ListOrganizationalUnitsForParent
          - organizations:ListParents
          - organizations:DescribeOrganizationalUnit
          - organizations:DescribeOrganization
          - organizations:DescribeAccount
          - sts:GetCallerIdentity
          Resource: '*'
  NableOrgReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Ref: RoleName
      Description: Read-only role nable's management account assumes to read this account.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${ManagementAccountId}:root
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - Ref: NableOrgReadOnlyPolicy
      Tags:
      - Key: ManagedBy
        Value: nable-finops
      - Key: Purpose
        Value: cost-intelligence-read-only
Outputs:
  RoleArn:
    Description: ARN of the nable read-only role in this account
    Value:
      Fn::GetAtt:
      - NableOrgReadOnlyRole
      - Arn
