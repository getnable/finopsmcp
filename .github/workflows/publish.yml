name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # needed for trusted publishing (OIDC)

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses PyPI Trusted Publishing (OIDC) — no token needed in secrets.
          # Set up at: https://pypi.org/manage/project/finops-mcp/settings/publishing/
          # Add GitHub Actions publisher:
          #   Owner: <your-github-org>
          #   Repository: finops
          #   Workflow: publish.yml
          skip-existing: true
