name: Publish (PyPI + MCP Registry)

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger: lets an agent or human re-run publishing for the current
  # main (e.g. when the tag predates a workflow change, or to retry the
  # registry leg alone). skip-existing makes the PyPI step a no-op on re-runs.
  workflow_dispatch:

# Least privilege: the workflow token is read-only by default; the two jobs that
# need id-token: write for OIDC request it explicitly at the job level.
permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # PEP 740 provenance attestations (default on >= v1.11; set explicitly
          # so a future default change cannot silently drop them).
          attestations: true
          # Uses PyPI Trusted Publishing (OIDC) — no token needed in secrets.
          # Set up at: https://pypi.org/manage/project/finops-mcp/settings/publishing/
          # Add GitHub Actions publisher:
          #   Owner: <your-github-org>
          #   Repository: finops
          #   Workflow: publish.yml
          skip-existing: true

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # mcp-publisher login github-oidc
    # The registry validates that the PyPI package referenced in server.json
    # exists, so publish there first.
    needs: build-and-publish

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mcp-publisher (pinned + checksum-verified)
        run: |
          # This job holds id-token: write, so the binary it runs must be
          # verified, not trusted blindly from releases/latest. Pin the release
          # version AND the artifact SHA256, then check the digest before
          # extracting or executing. A swapped or compromised upstream binary
          # fails the digest check and never runs. Runner is always ubuntu-latest
          # (linux/amd64); checksum from registry_1.7.9_checksums.txt.
          VERSION="v1.7.9"
          ASSET="mcp-publisher_linux_amd64.tar.gz"
          SHA256="ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
          curl -sSL --fail "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/${ASSET}" -o "${ASSET}"
          echo "${SHA256}  ${ASSET}" | sha256sum -c -
          tar xzf "${ASSET}" mcp-publisher

      - name: Login to registry (GitHub Actions OIDC, no tokens or device codes)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
